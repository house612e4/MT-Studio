<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ছবি জেনারেটর — MT Studio</title>
  <link rel="icon" type="image/jpeg" href="https://raw.githubusercontent.com/house612e4/MT-Studio/main/public/MT_LOGO.jpeg">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; color: #fff; font-family: 'Outfit', sans-serif; padding-bottom: 100px; }

    @keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    .animate-slide-up { animation: slideUp 0.5s ease-out; }

    .glass { background: rgba(255,255,255,0.08); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; }
    .btn-primary { background: linear-gradient(135deg, #a78bfa, #7c3aed); border: none; color: white; padding: 12px 24px; border-radius: 10px; font-weight: 700; cursor: pointer; transition: all 0.3s; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(168,139,250,0.4); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .input-field { width: 100%; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 10px; padding: 12px 14px; color: white; font-size: 14px; font-family: 'Outfit', sans-serif; outline: none; }
    .input-field:focus { border-color: #a78bfa; }
    .input-field::placeholder { color: #666; }

    .upload-zone { border: 2px dashed rgba(168,139,250,0.3); border-radius: 12px; padding: 24px; text-align: center; cursor: pointer; transition: all 0.3s; }
    .upload-zone:hover { border-color: #a78bfa; background: rgba(168,139,250,0.05); }
    .upload-zone.dragover { border-color: #a78bfa; background: rgba(168,139,250,0.1); }

    .image-preview { width: 100%; height: 200px; background: #111; border-radius: 10px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .image-preview img { width: 100%; height: 100%; object-fit: cover; }

    .option-btn { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: white; padding: 10px 16px; border-radius: 8px; font-size: 13px; cursor: pointer; transition: all 0.3s; }
    .option-btn.active { background: #a78bfa; border-color: #a78bfa; }
    .option-btn:hover { border-color: #a78bfa; }

    .result-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
    .result-item { position: relative; border-radius: 10px; overflow: hidden; aspect-ratio: 1; background: #111; }
    .result-item img { width: 100%; height: 100%; object-fit: cover; }
    .result-item-btn { position: absolute; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; gap: 8px; opacity: 0; transition: opacity 0.3s; }
    .result-item:hover .result-item-btn { opacity: 1; }
    .result-item-btn button { padding: 6px 10px; border: none; border-radius: 6px; font-size: 11px; cursor: pointer; background: #a78bfa; color: white; font-weight: 700; }

    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 70px; background: rgba(0,0,0,0.95); backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-around; align-items: center; z-index: 100; }
    .nav-item { display: flex; flex-direction: column; align-items: center; gap: 3px; color: #555; text-decoration: none; font-size: 10px; font-weight: 600; transition: all 0.3s; }
    .nav-item.active, .nav-item:hover { color: #a78bfa; }
    .nav-item i { font-size: 20px; }

    .top-bar { position: fixed; top: 0; left: 0; right: 0; z-index: 50; padding: 12px 16px; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; }
    .credit-badge { background: linear-gradient(135deg, #f97316, #ea580c); padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; }

    .alert { padding: 12px 14px; border-radius: 8px; margin-bottom: 12px; font-size: 13px; display: none; }
    .alert.show { display: block; }
    .alert-error { background: rgba(244,63,94,0.2); border: 1px solid rgba(244,63,94,0.3); color: #fda4af; }
    .alert-success { background: rgba(16,185,129,0.2); border: 1px solid rgba(16,185,129,0.3); color: #6ee7b7; }
  </style>
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">
  <div class="flex items-center gap-2">
    <a href="index.html" class="text-gray-400 hover:text-white"><i class="fa-solid fa-arrow-left text-lg"></i></a>
    <div>
      <h1 class="text-sm font-bold">AI ছবি জেনারেটর</h1>
      <p class="text-[10px] text-gray-500">প্রতি ছবি = ৫ ক্রেডিট</p>
    </div>
  </div>
  <div class="credit-badge" id="creditDisplay">⚡ ...</div>
</div>

<!-- MAIN -->
<main style="padding-top: 60px;">

  <div class="max-w-2xl mx-auto px-4 py-6">

    <div id="alertBox" class="alert"></div>

    <!-- Prompt Input -->
    <section class="mb-6 animate-slide-up">
      <label class="text-sm font-bold mb-2 block">ছবির বর্ণনা লেখো</label>
      <textarea id="prompt" class="input-field" placeholder="যেমন: একটি সুন্দর সমুদ্র সৈকত, সূর্যাস্ত, নীল আকাশ..." rows="3"></textarea>
      <div class="text-xs text-gray-500 mt-1">
        <span id="charCount">0</span>/500 অক্ষর
      </div>
    </section>

    <!-- Reference Image Upload -->
    <section class="mb-6 animate-slide-up" style="animation-delay: 0.1s">
      <label class="text-sm font-bold mb-2 block">রেফারেন্স ইমেজ (Optional)</label>
      <div class="upload-zone" id="uploadZone" onclick="document.getElementById('imageInput').click()">
        <i class="fa-solid fa-cloud-arrow-up text-3xl text-purple-400 mb-2"></i>
        <p class="font-bold mb-1">ইমেজ drag করো বা ক্লিক করো</p>
        <p class="text-xs text-gray-500">PNG, JPG (Max 5MB)</p>
      </div>
      <input type="file" id="imageInput" accept="image/*" style="display:none">
      <div id="imagePreview" class="hidden mt-4">
        <p class="text-xs text-gray-500 mb-2">আপলোডকৃত ইমেজ:</p>
        <div class="image-preview"><img id="previewImg" src=""></div>
        <button onclick="clearImage()" class="text-xs text-red-400 mt-2">সাফ করো</button>
      </div>
    </section>

    <!-- Style Selection -->
    <section class="mb-6 animate-slide-up" style="animation-delay: 0.2s">
      <label class="text-sm font-bold mb-3 block">স্টাইল নির্বাচন করো</label>
      <div class="grid grid-cols-2 gap-2">
        <button class="option-btn active" onclick="selectStyle(this, 'vivid')">✨ Vivid</button>
        <button class="option-btn" onclick="selectStyle(this, 'natural')">🌿 Natural</button>
        <button class="option-btn" onclick="selectStyle(this, 'cinematic')">🎬 Cinematic</button>
        <button class="option-btn" onclick="selectStyle(this, 'anime')">🎨 Anime</button>
        <button class="option-btn" onclick="selectStyle(this, 'oil-painting')">🖌️ Oil Paint</button>
        <button class="option-btn" onclick="selectStyle(this, '3d-render')">🎯 3D Render</button>
      </div>
    </section>

    <!-- Size Selection -->
    <section class="mb-6 animate-slide-up" style="animation-delay: 0.3s">
      <label class="text-sm font-bold mb-3 block">সাইজ নির্বাচন করো</label>
      <div class="grid grid-cols-2 gap-2">
        <button class="option-btn active" onclick="selectSize(this, '1024x1024')">1024×1024</button>
        <button class="option-btn" onclick="selectSize(this, '1792x1024')">1792×1024</button>
        <button class="option-btn" onclick="selectSize(this, '1024x1792')">1024×1792</button>
        <button class="option-btn" onclick="selectSize(this, '2048x2048')">4K (2048×2048)</button>
      </div>
    </section>

    <!-- Generate Button -->
    <section class="mb-12 animate-slide-up" style="animation-delay: 0.4s">
      <button class="btn-primary w-full" id="generateBtn" onclick="generateImage()">
        <i class="fa-solid fa-wand-magic-sparkles"></i> ছবি তৈরি করো
      </button>
      <p class="text-xs text-gray-500 text-center mt-3">৫ ক্রেডিট ব্যবহার হবে</p>
    </section>

    <!-- Results -->
    <section id="resultsSection" class="hidden">
      <h2 class="text-lg font-bold mb-4">তৈরিকৃত ছবি</h2>
      <div class="result-grid" id="resultGrid"></div>
    </section>

  </div>

</main>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <a href="index.html" class="nav-item">
    <i class="fa-solid fa-house"></i> <span>Home</span>
  </a>
  <a href="image-generator.html" class="nav-item active">
    <i class="fa-solid fa-image"></i> <span>Image</span>
  </a>
  <a href="video-generator.html" class="nav-item">
    <i class="fa-solid fa-video"></i> <span>Video</span>
  </a>
  <a href="chat.html" class="nav-item">
    <i class="fa-solid fa-message"></i> <span>Chat</span>
  </a>
  <a href="pricing.html" class="nav-item">
    <i class="fa-solid fa-coins"></i> <span>Pricing</span>
  </a>
</nav>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { getFirestore, doc, getDoc, updateDoc, collection, addDoc, increment, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDUrdFcmUduLMn0HqODf1uaRlDjCUg8ApM",
    authDomain: "mt-studio-92d1e.firebaseapp.com",
    projectId: "mt-studio-92d1e",
    storageBucket: "mt-studio-92d1e.firebasestorage.app",
    messagingSenderId: "455687864985",
    appId: "1:455687874985:web:327dedaffdb7b5f8606e08"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let currentUser = null;
  let currentCredits = 0;
  let selectedStyle = 'vivid';
  let selectedSize = '1024x1024';
  let referenceImage = null;
  const IMAGE_COST = 5;

  // Auth check
  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      window.location.href = 'index.html';
      return;
    }
    currentUser = user;
    await loadCredits();
  });

  // Load credits
  async function loadCredits() {
    try {
      const userDoc = await getDoc(doc(db, 'users', currentUser.uid));
      if (userDoc.exists()) {
        currentCredits = userDoc.data().credits || 0;
        document.getElementById('creditDisplay').textContent = `⚡ ${currentCredits} ক্রেডিট`;
      }
    } catch (e) {
      console.error('Credit load error:', e);
    }
  }

  // Image upload
  document.getElementById('uploadZone').addEventListener('dragover', (e) => {
    e.preventDefault();
    document.getElementById('uploadZone').classList.add('dragover');
  });

  document.getElementById('uploadZone').addEventListener('dragleave', () => {
    document.getElementById('uploadZone').classList.remove('dragover');
  });

  document.getElementById('uploadZone').addEventListener('drop', (e) => {
    e.preventDefault();
    const file = e.dataTransfer.files[0];
    handleImageUpload(file);
  });

  document.getElementById('imageInput').addEventListener('change', (e) => {
    handleImageUpload(e.target.files[0]);
  });

  function handleImageUpload(file) {
    if (!file) return;
    if (file.size > 5 * 1024 * 1024) {
      showAlert('ফাইল ৫MB এর কম হতে হবে', 'error');
      return;
    }

    const reader = new FileReader();
    reader.onload = (e) => {
      referenceImage = e.target.result;
      document.getElementById('previewImg').src = referenceImage;
      document.getElementById('imagePreview').classList.remove('hidden');
      document.getElementById('uploadZone').classList.add('hidden');
    };
    reader.readAsDataURL(file);
  }

  window.clearImage = () => {
    referenceImage = null;
    document.getElementById('imagePreview').classList.add('hidden');
    document.getElementById('uploadZone').classList.remove('hidden');
    document.getElementById('imageInput').value = '';
  };

  // Character count
  document.getElementById('prompt').addEventListener('input', (e) => {
    document.getElementById('charCount').textContent = e.target.value.length;
  });

  // Style selection
  window.selectStyle = (btn, style) => {
    document.querySelectorAll('.option-btn').forEach((b, i) => {
      if (i < 6) b.classList.remove('active');
    });
    btn.classList.add('active');
    selectedStyle = style;
  };

  // Size selection
  window.selectSize = (btn, size) => {
    const btns = document.querySelectorAll('.option-btn');
    btns.forEach((b, i) => {
      if (i >= 6) b.classList.remove('active');
    });
    btn.classList.add('active');
    selectedSize = size;
  };

  // Generate image
  window.generateImage = async () => {
    const prompt = document.getElementById('prompt').value.trim();
    if (!prompt) {
      showAlert('ছবির বর্ণনা লেখো', 'error');
      return;
    }

    if (currentCredits < IMAGE_COST) {
      showAlert(`অপর্যাপ্ত ক্রেডিট। তোমার ${currentCredits}টি ক্রেডিট আছে।`, 'error');
      return;
    }

    const btn = document.getElementById('generateBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="inline-block animate-spin">⏳</span> তৈরি হচ্ছে...';

    try {
      // Call Cloudflare Worker
      const response = await fetch('https://hidden-sky-3109.studiomt46.workers.dev', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          type: 'image',
          prompt: prompt,
          size: selectedSize,
          style: selectedStyle
        })
      });

      const data = await response.json();
      if (!data.success || !data.imageUrl) throw new Error('ছবি তৈরি হয়নি');

      // Deduct credits
      await updateDoc(doc(db, 'users', currentUser.uid), {
        credits: increment(-IMAGE_COST),
        totalSpent: increment(IMAGE_COST)
      });

      // Save to Firestore
      await addDoc(collection(db, 'images'), {
        userId: currentUser.uid,
        prompt: prompt,
        imageUrl: data.imageUrl,
        style: selectedStyle,
        size: selectedSize,
        hasReference: !!referenceImage,
        createdAt: serverTimestamp()
      });

      currentCredits -= IMAGE_COST;
      document.getElementById('creditDisplay').textContent = `⚡ ${currentCredits} ক্রেডিট`;

      // Show result
      const resultGrid = document.getElementById('resultGrid');
      resultGrid.innerHTML = `
        <div class="result-item">
          <img src="${data.imageUrl}" alt="Generated">
          <div class="result-item-btn">
            <button onclick="downloadImage('${data.imageUrl}')">ডাউনলোড</button>
          </div>
        </div>
      `;
      document.getElementById('resultsSection').classList.remove('hidden');

      showAlert('✅ ছবি তৈরি হয়েছে!', 'success');
      document.getElementById('prompt').value = '';
      clearImage();

    } catch (e) {
      console.error(e);
      showAlert('ছবি তৈরিতে সমস্যা হয়েছে। আবার চেষ্টা করো।', 'error');
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<i class="fa-solid fa-wand-magic-sparkles"></i> ছবি তৈরি করো';
    }
  };

  window.downloadImage = (url) => {
    const a = document.createElement('a');
    a.href = url;
    a.download = 'mt-studio-image.png';
    a.click();
  };

  function showAlert(msg, type) {
    const alertBox = document.getElementById('alertBox');
    alertBox.textContent = msg;
    alertBox.className = `alert show alert-${type}`;
    setTimeout(() => alertBox.classList.remove('show'), 4000);
  }
</script>

</body>
</html>
