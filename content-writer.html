<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Content Writer — MT Studio</title>
  <link rel="icon" type="image/jpeg" href="https://raw.githubusercontent.com/house612e4/MT-Studio/main/public/MT_LOGO.jpeg">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { background:#050B14; color:#e2e8f0; padding-bottom:80px; }
    .bottom-nav { position:fixed; bottom:0; left:0; right:0; z-index:50; background:rgba(5,11,20,0.96); backdrop-filter:blur(20px); border-top:1px solid rgba(255,255,255,0.05); display:flex; justify-content:space-around; padding:6px 0 14px; }
    .bnav-item { display:flex; flex-direction:column; align-items:center; gap:3px; color:#475569; font-size:10px; font-weight:600; cursor:pointer; text-decoration:none; }
    .bnav-item.active { color:#22d3ee; }
    .bnav-item i { font-size:19px; }
    .content-type-tab { background:rgba(15,23,42,0.8); border:1px solid rgba(255,255,255,0.1); color:#94a3b8; padding:10px 14px; border-radius:8px; cursor:pointer; font-size:12px; font-weight:600; transition:all 0.2s; }
    .content-type-tab.active { background:rgba(34,211,238,0.15); border-color:rgba(34,211,238,0.4); color:#22d3ee; }
    .form-input, .form-textarea { width:100%; background:rgba(15,23,42,0.8); border:1px solid rgba(255,255,255,0.1); color:white; padding:10px 12px; border-radius:8px; font-size:13px; font-family:inherit; outline:none; }
    .form-input:focus, .form-textarea:focus { border-color:rgba(34,211,238,0.3); }
    .form-textarea { resize:vertical; min-height:80px; }
    .gen-btn { width:100%; background:linear-gradient(135deg,#0891b2,#7c3aed); border:none; color:white; padding:12px; border-radius:8px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; transition:all 0.2s; font-size:13px; }
    .gen-btn:hover:not(:disabled) { box-shadow:0 0 20px rgba(8,145,178,0.3); }
    .gen-btn:disabled { opacity:0.5; cursor:not-allowed; }
    .result-box { background:rgba(15,23,42,0.8); border:1px solid rgba(255,255,255,0.1); border-radius:10px; padding:14px; margin-top:16px; display:none; }
    .result-box.show { display:block; }
    .copy-btn { background:rgba(34,211,238,0.1); border:1px solid rgba(34,211,238,0.3); color:#22d3ee; padding:8px 14px; border-radius:6px; font-size:12px; font-weight:600; cursor:pointer; transition:all 0.2s; }
    .copy-btn:hover { background:rgba(34,211,238,0.2); }
  </style>
</head>
<body class="bg-slate-950">

<!-- TOP NAV -->
<nav class="fixed top-0 left-0 right-0 z-50 bg-slate-950/90 backdrop-blur-xl border-b border-white/5 px-4 py-3 flex items-center justify-between">
  <div class="flex items-center gap-3">
    <a href="index.html" class="text-slate-400 hover:text-white p-1">
      <i class="fa-solid fa-arrow-left text-lg"></i>
    </a>
    <div>
      <h1 class="text-sm font-extrabold text-white">Content Writer</h1>
      <p class="text-[9px] text-slate-500">AI Generator</p>
    </div>
  </div>
  <div id="creditsDisplay" class="text-xs font-bold text-cyan-300">লোড...</div>
</nav>

<!-- MAIN -->
<main class="pt-16 px-4">

  <div class="pt-4 pb-4">
    <p class="text-xs text-cyan-400 font-bold uppercase mb-1">✦ AI দিয়ে কন্টেন্ট তৈরি করো</p>
    <h2 class="text-2xl font-extrabold text-white">Blog, Ads<br><span class="bg-gradient-to-r from-cyan-400 to-violet-400 bg-clip-text text-transparent">সোশ্যাল পোস্ট</span></h2>
    <p class="text-xs text-slate-500 mt-1.5">প্রতি কন্টেন্ট = 3 credits</p>
  </div>

  <!-- CONTENT TYPE TABS -->
  <div class="flex gap-2 mb-4 overflow-x-auto pb-2">
    <button class="content-type-tab active" onclick="switchType(this,'blog')">📝 Blog Post</button>
    <button class="content-type-tab" onclick="switchType(this,'ads')">📢 Ad Copy</button>
    <button class="content-type-tab" onclick="switchType(this,'social')">📱 Social Post</button>
    <button class="content-type-tab" onclick="switchType(this,'product')">🛍️ Product Desc</button>
  </div>

  <!-- BLOG POST FORM -->
  <div id="blog-form" class="content-form">
    <div class="mb-3">
      <label class="text-xs font-bold text-slate-500 uppercase mb-1 block">Blog Title</label>
      <input type="text" class="form-input" id="blog-title" placeholder="e.g., How to Start a Successful E-commerce Business">
    </div>
    <div class="mb-3">
      <label class="text-xs font-bold text-slate-500 uppercase mb-1 block">Topic/Keyword</label>
      <input type="text" class="form-input" id="blog-keyword" placeholder="e.g., e-commerce, startup tips">
    </div>
    <div class="mb-3">
      <label class="text-xs font-bold text-slate-500 uppercase mb-1 block">Word Count</label>
      <select class="form-input" id="blog-words">
        <option value="500">500 words (short)</option>
        <option value="1000" selected>1000 words (medium)</option>
        <option value="1500">1500 words (long)</option>
      </select>
    </div>
    <button class="gen-btn" onclick="generateContent('blog')">
      <i class="fa-solid fa-pen-fancy"></i> Generate Blog Post
    </button>
  </div>

  <!-- AD COPY FORM -->
  <div id="ads-form" class="content-form hidden">
    <div class="mb-3">
      <label class="text-xs font-bold text-slate-500 uppercase mb-1 block">Product Name</label>
      <input type="text" class="form-input" id="ads-product" placeholder="e.g., Premium Yoga Mat">
    </div>
    <div class="mb-3">
      <label class="text-xs font-bold text-slate-500 uppercase mb-1 block">Product Benefits</label>
      <textarea class="form-textarea" id="ads-benefits" placeholder="e.g., eco-friendly, durable, comfortable"></textarea>
    </div>
    <div class="mb-3">
      <label class="text-xs font-bold text-slate-500 uppercase mb-1 block">Target Audience</label>
      <input type="text" class="form-input" id="ads-audience" placeholder="e.g., fitness enthusiasts, yoga lovers">
    </div>
    <button class="gen-btn" onclick="generateContent('ads')">
      <i class="fa-solid fa-bullhorn"></i> Generate Ad Copy
    </button>
  </div>

  <!-- SOCIAL POST FORM -->
  <div id="social-form" class="content-form hidden">
    <div class="mb-3">
      <label class="text-xs font-bold text-slate-500 uppercase mb-1 block">Topic/News</label>
      <input type="text" class="form-input" id="social-topic" placeholder="e.g., New product launch, industry news">
    </div>
    <div class="mb-3">
      <label class="text-xs font-bold text-slate-500 uppercase mb-1 block">Platform</label>
      <select class="form-input" id="social-platform">
        <option value="Instagram">Instagram</option>
        <option value="Twitter">Twitter/X</option>
        <option value="Facebook">Facebook</option>
        <option value="LinkedIn">LinkedIn</option>
      </select>
    </div>
    <div class="mb-3">
      <label class="text-xs font-bold text-slate-500 uppercase mb-1 block">Tone</label>
      <select class="form-input" id="social-tone">
        <option value="casual">Casual & Fun</option>
        <option value="professional">Professional</option>
        <option value="emotional">Emotional & Inspiring</option>
        <option value="humorous">Humorous</option>
      </select>
    </div>
    <button class="gen-btn" onclick="generateContent('social')">
      <i class="fa-solid fa-share-nodes"></i> Generate Post
    </button>
  </div>

  <!-- PRODUCT DESCRIPTION FORM -->
  <div id="product-form" class="content-form hidden">
    <div class="mb-3">
      <label class="text-xs font-bold text-slate-500 uppercase mb-1 block">Product Name</label>
      <input type="text" class="form-input" id="product-name" placeholder="e.g., Wireless Bluetooth Speaker">
    </div>
    <div class="mb-3">
      <label class="text-xs font-bold text-slate-500 uppercase mb-1 block">Key Features</label>
      <textarea class="form-textarea" id="product-features" placeholder="e.g., 360° sound, 12-hour battery, waterproof"></textarea>
    </div>
    <div class="mb-3">
      <label class="text-xs font-bold text-slate-500 uppercase mb-1 block">Price</label>
      <input type="text" class="form-input" id="product-price" placeholder="e.g., $49.99">
    </div>
    <button class="gen-btn" onclick="generateContent('product')">
      <i class="fa-solid fa-shopping-cart"></i> Generate Description
    </button>
  </div>

  <!-- RESULT -->
  <div id="resultBox" class="result-box">
    <div class="flex items-center justify-between mb-3">
      <h3 class="font-bold text-cyan-300 text-sm">Generated Content</h3>
      <button class="copy-btn" onclick="copyToClipboard()">
        <i class="fa-solid fa-copy"></i> Copy
      </button>
    </div>
    <div id="resultContent" class="text-sm leading-relaxed whitespace-pre-wrap"></div>
  </div>

  <!-- LOADING -->
  <div id="loadingBox" style="display:none;" class="text-center py-8">
    <div style="width:30px;height:30px;border:3px solid rgba(255,255,255,0.1);border-top-color:#22d3ee;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;"></div>
    <p class="text-xs text-slate-600">কন্টেন্ট তৈরি হচ্ছে...</p>
  </div>

</main>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <a href="index.html" class="bnav-item"><i class="fa-solid fa-house"></i><span>Home</span></a>
  <a href="#" class="bnav-item"><i class="fa-solid fa-compass"></i><span>Inspire</span></a>
  <a href="image-generator.html" class="bnav-item"><i class="fa-solid fa-image"></i><span>Image</span></a>
  <a href="chat.html" class="bnav-item"><i class="fa-solid fa-message"></i><span>Chat</span></a>
  <a href="#" class="bnav-item active"><i class="fa-solid fa-pen"></i><span>Content</span></a>
</nav>

<style>
  @keyframes spin { to { transform:rotate(360deg); } }
  .content-form.hidden { display:none; }
</style>

<!-- FIREBASE & LOGIC -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, updateDoc, increment, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const app = initializeApp({
    apiKey:"AIzaSyDUrdFcmUduLMn0HqODf1uaRlDjCUg8ApM",
    authDomain:"mt-studio-92d1e.firebaseapp.com",
    projectId:"mt-studio-92d1e",
    storageBucket:"mt-studio-92d1e.firebasestorage.app",
    messagingSenderId:"455687864985",
    appId:"1:455687864985:web:327dedaffdb7b5f8606e08"
  });
  const auth = getAuth(app);
  const db = getFirestore(app);

  const CONTENT_COST = 3;
  const WORKER_URL = 'https://hidden-sky-3109.studiomt46.workers.dev';
  let currentUser = null;
  let userCredits = 0;
  let currentType = 'blog';

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      currentUser = user;
      const ref = doc(db, 'users', user.uid);
      const snap = await getDoc(ref);
      if (snap.exists()) {
        userCredits = snap.data().credits || 0;
      }
      updateCreditsDisplay();
    } else {
      document.getElementById('creditsDisplay').textContent = 'Login করো';
    }
  });

  function updateCreditsDisplay() {
    document.getElementById('creditsDisplay').textContent = userCredits + ' credits';
  }

  window.switchType = function(btn, type) {
    document.querySelectorAll('.content-type-tab').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.content-form').forEach(f => f.classList.add('hidden'));
    btn.classList.add('active');
    currentType = type;
    document.getElementById(type + '-form').classList.remove('hidden');
    document.getElementById('resultBox').classList.remove('show');
  };

  window.generateContent = async function(type) {
    if (!currentUser) {
      if (confirm('Login করতে হবে। যাবে?')) window.location.href = 'index.html';
      return;
    }

    if (userCredits < CONTENT_COST) {
      alert(`Credits কম! দরকার ${CONTENT_COST}`);
      return;
    }

    let prompt = '';
    switch(type) {
      case 'blog':
        const title = document.getElementById('blog-title').value;
        const keyword = document.getElementById('blog-keyword').value;
        const words = document.getElementById('blog-words').value;
        if (!title || !keyword) { alert('সব field fill করো!'); return; }
        prompt = `Write a ${words}-word SEO-friendly blog post titled "${title}" about "${keyword}". In Bengali.`;
        break;
      case 'ads':
        const product = document.getElementById('ads-product').value;
        const benefits = document.getElementById('ads-benefits').value;
        const audience = document.getElementById('ads-audience').value;
        if (!product) { alert('Product name লাগবে!'); return; }
        prompt = `Write a compelling ad copy for "${product}" with benefits: ${benefits}. Target audience: ${audience}. In Bengali. Keep it short and catchy.`;
        break;
      case 'social':
        const topic = document.getElementById('social-topic').value;
        const platform = document.getElementById('social-platform').value;
        const tone = document.getElementById('social-tone').value;
        if (!topic) { alert('Topic লাগবে!'); return; }
        prompt = `Write a ${tone} social media post for ${platform} about "${topic}". In Bengali. Include relevant hashtags. Keep it engaging and shareable.`;
        break;
      case 'product':
        const pname = document.getElementById('product-name').value;
        const features = document.getElementById('product-features').value;
        const price = document.getElementById('product-price').value;
        if (!pname || !features) { alert('Product details লাগবে!'); return; }
        prompt = `Write a compelling product description for "${pname}" with features: ${features}. Price: ${price}. In Bengali. Make it persuasive and highlight benefits.`;
        break;
    }

    document.getElementById('loadingBox').style.display = 'block';
    document.getElementById('resultBox').classList.remove('show');

    try {
      const res = await fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          messages: [
            { role: 'system', content: 'তুমি একজন professional content writer। উচ্চমানের Bengali content লেখো যা engaging এবং SEO-friendly।' },
            { role: 'user', content: prompt }
          ]
        })
      });

      const data = await res.json();

      if (data.choices && data.choices[0]) {
        const content = data.choices[0].message.content;
        document.getElementById('resultContent').textContent = content;
        document.getElementById('resultBox').classList.add('show');

        // Deduct credits
        await updateDoc(doc(db, 'users', currentUser.uid), {
          credits: increment(-CONTENT_COST)
        });
        userCredits -= CONTENT_COST;
        updateCreditsDisplay();

        // Save to history
        await addDoc(collection(db, 'contents'), {
          userId: currentUser.uid,
          type: type,
          content: content,
          createdAt: serverTimestamp()
        });

      } else {
        alert('সমস্যা হয়েছে। আবার চেষ্টা করো।');
      }

    } catch(err) {
      alert('Error: ' + err.message);
    }

    document.getElementById('loadingBox').style.display = 'none';
  };

  window.copyToClipboard = function() {
    const text = document.getElementById('resultContent').textContent;
    navigator.clipboard.writeText(text).then(() => {
      alert('Copied to clipboard!');
    });
  };
</script>

</body>
</html>
