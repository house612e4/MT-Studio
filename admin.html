<!DOCTYPE html>
<html lang="bn" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MT Studio — Blog Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { background-color: #050B14; color: #e2e8f0; font-family: 'Inter', sans-serif; }
    .ql-toolbar { background: #0F172A; border-color: rgba(255,255,255,0.1) !important; border-radius: 12px 12px 0 0; }
    .ql-container { background: #0A0F1C; border-color: rgba(255,255,255,0.1) !important; border-radius: 0 0 12px 12px; min-height: 300px; color: white; font-size: 16px; }
    .ql-editor { min-height: 300px; }
    .ql-toolbar .ql-stroke { stroke: #94a3b8; }
    .ql-toolbar .ql-fill { fill: #94a3b8; }
    .ql-toolbar .ql-picker { color: #94a3b8; }
    input, select, textarea { background: #0A0F1C !important; border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 12px; padding: 12px 16px; width: 100%; outline: none; transition: border-color 0.2s; }
    input:focus, select:focus, textarea:focus { border-color: rgba(6,182,212,0.5); }
    .btn-primary { background: linear-gradient(to right, #0891b2, #7c3aed); color: white; font-weight: 700; padding: 14px 28px; border-radius: 12px; border: none; cursor: pointer; transition: opacity 0.2s; width: 100%; font-size: 16px; }
    .btn-primary:hover { opacity: 0.9; }
    .post-card { background: #0A0F1C; border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 20px; transition: border-color 0.2s; }
    .post-card:hover { border-color: rgba(6,182,212,0.3); }
    .tag { background: rgba(6,182,212,0.1); border: 1px solid rgba(6,182,212,0.2); color: #67e8f9; padding: 2px 10px; border-radius: 99px; font-size: 11px; font-weight: 600; }
    #loginBox { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .status-live { background: rgba(34,197,94,0.1); color: #4ade80; border: 1px solid rgba(34,197,94,0.2); padding: 2px 10px; border-radius: 99px; font-size: 11px; font-weight: 700; }
    .status-draft { background: rgba(234,179,8,0.1); color: #fbbf24; border: 1px solid rgba(234,179,8,0.2); padding: 2px 10px; border-radius: 99px; font-size: 11px; font-weight: 700; }
  </style>
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
  <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
</head>
<body>

<!-- Login Box -->
<div id="loginBox">
  <div style="background:#0A0F1C;border:1px solid rgba(255,255,255,0.1);border-radius:24px;padding:48px;width:100%;max-width:420px;">
    <div style="text-align:center;margin-bottom:32px;">
      <div style="width:64px;height:64px;border-radius:16px;overflow:hidden;margin:0 auto 16px;border:1px solid rgba(6,182,212,0.3);">
        <img src="https://raw.githubusercontent.com/house612e4/MT-Studio/main/public/MT_LOGO.jpeg" style="width:100%;height:100%;object-fit:cover;">
      </div>
      <h1 style="font-size:24px;font-weight:800;color:white;margin-bottom:4px;">MT Studio Admin</h1>
      <p style="color:#64748b;font-size:14px;">Blog Management Panel</p>
    </div>
    <div style="margin-bottom:16px;">
      <label style="display:block;font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px;">Email</label>
      <input type="email" id="loginEmail" placeholder="admin@mtstudio.com">
    </div>
    <div style="margin-bottom:24px;">
      <label style="display:block;font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px;">Password</label>
      <input type="password" id="loginPass" placeholder="••••••••">
    </div>
    <button class="btn-primary" onclick="doLogin()"><i class="fa-solid fa-right-to-bracket mr-2"></i> Admin Login</button>
    <p id="loginErr" style="color:#f87171;font-size:13px;text-align:center;margin-top:12px;display:none;"></p>
  </div>
</div>

<!-- Admin Panel -->
<div id="adminPanel" style="display:none;">
  <!-- Topbar -->
  <div style="position:fixed;top:0;left:0;right:0;z-index:50;background:rgba(5,11,20,0.9);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.05);padding:16px 24px;display:flex;justify-content:space-between;align-items:center;">
    <div style="display:flex;align-items:center;gap:12px;">
      <div style="width:36px;height:36px;border-radius:10px;overflow:hidden;border:1px solid rgba(6,182,212,0.3);">
        <img src="https://raw.githubusercontent.com/house612e4/MT-Studio/main/public/MT_LOGO.jpeg" style="width:100%;height:100%;object-fit:cover;">
      </div>
      <div>
        <p style="font-weight:700;color:white;font-size:15px;">MT Studio</p>
        <p style="font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:0.1em;">Blog Admin</p>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <a href="index.html" target="_blank" style="color:#67e8f9;font-size:13px;font-weight:600;text-decoration:none;"><i class="fa-solid fa-eye mr-1"></i> View Site</a>
      <button onclick="doLogout()" style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:#f87171;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;">
        <i class="fa-solid fa-right-from-bracket mr-1"></i> Logout
      </button>
    </div>
  </div>

  <div style="max-width:1200px;margin:0 auto;padding:100px 24px 48px;">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:32px;">

      <!-- Write Post -->
      <div>
        <h2 style="font-size:22px;font-weight:800;color:white;margin-bottom:24px;" id="formTitle"><i class="fa-solid fa-pen-to-square text-cyan-400 mr-2"></i> নতুন পোস্ট লিখুন</h2>
        <div style="display:flex;flex-direction:column;gap:16px;">
          <div>
            <label style="display:block;font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px;">পোস্ট টাইটেল *</label>
            <input type="text" id="postTitle" placeholder="আপনার পোস্টের শিরোনাম লিখুন...">
          </div>
          <div>
            <label style="display:block;font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px;">ক্যাটাগরি</label>
            <select id="postCategory">
              <option value="ওয়েব ডেভেলপমেন্ট">ওয়েব ডেভেলপমেন্ট</option>
              <option value="AI Tools">AI Tools</option>
              <option value="Facebook Tips">Facebook Tips</option>
              <option value="App Building">App Building</option>
              <option value="ডিজিটাল মার্কেটিং">ডিজিটাল মার্কেটিং</option>
              <option value="অন্যান্য">অন্যান্য</option>
            </select>
          </div>
          <div>
            <label style="display:block;font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px;">কভার ইমেজ URL (ঐচ্ছিক)</label>
            <input type="url" id="postCover" placeholder="https://images.unsplash.com/...">
          </div>
          <div>
            <label style="display:block;font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px;">সংক্ষিপ্ত বিবরণ *</label>
            <textarea id="postExcerpt" rows="2" placeholder="পোস্টের সংক্ষিপ্ত বিবরণ..."></textarea>
          </div>
          <div>
            <label style="display:block;font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px;">পোস্টের বিস্তারিত লেখা *</label>
            <div id="editor"></div>
          </div>
          <div style="display:flex;gap:12px;margin-top:8px;">
            <button class="btn-primary" onclick="savePost('published')" style="flex:1;">
              <i class="fa-solid fa-paper-plane mr-2"></i> Publish করুন
            </button>
            <button onclick="savePost('draft')" style="flex:1;background:#0A0F1C;border:1px solid rgba(255,255,255,0.1);color:#94a3b8;font-weight:600;padding:14px;border-radius:12px;cursor:pointer;font-size:15px;">
              <i class="fa-regular fa-floppy-disk mr-2"></i> Draft সেভ
            </button>
          </div>
          <button id="cancelEdit" onclick="cancelEdit()" style="display:none;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:#f87171;padding:12px;border-radius:12px;cursor:pointer;font-weight:600;">
            <i class="fa-solid fa-xmark mr-2"></i> বাতিল করুন
          </button>
          <p id="saveStatus" style="text-align:center;font-size:13px;color:#4ade80;display:none;"></p>
        </div>
      </div>

      <!-- Post List -->
      <div>
        <h2 style="font-size:22px;font-weight:800;color:white;margin-bottom:24px;"><i class="fa-solid fa-list text-violet-400 mr-2"></i> সব পোস্ট</h2>
        <div id="postList" style="display:flex;flex-direction:column;gap:12px;">
          <p style="color:#64748b;font-size:14px;">লোড হচ্ছে...</p>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, orderBy, query, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDUrdFcmUduLMn0HqODf1uaRlDjCUg8ApM",
    authDomain: "mt-studio-92d1e.firebaseapp.com",
    projectId: "mt-studio-92d1e",
    storageBucket: "mt-studio-92d1e.firebasestorage.app",
    messagingSenderId: "455687864985",
    appId: "1:455687864985:web:327dedaffdb7b5f8606e08"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // Quill Editor
  const quill = new Quill('#editor', {
    theme: 'snow',
    placeholder: 'এখানে বিস্তারিত লিখুন...',
    modules: {
      toolbar: [
        [{ 'header': [1, 2, 3, false] }],
        ['bold', 'italic', 'underline'],
        [{ 'list': 'ordered'}, { 'list': 'bullet' }],
        ['link', 'image'],
        ['clean']
      ]
    }
  });

  let editingId = null;

  window.doLogin = async function() {
    const email = document.getElementById('loginEmail').value;
    const pass = document.getElementById('loginPass').value;
    const errEl = document.getElementById('loginErr');
    try {
      await signInWithEmailAndPassword(auth, email, pass);
    } catch(e) {
      errEl.style.display = 'block';
      errEl.textContent = 'Email বা Password ভুল।';
    }
  };

  window.doLogout = async function() {
    await signOut(auth);
  };

  onAuthStateChanged(auth, user => {
    if (user) {
      document.getElementById('loginBox').style.display = 'none';
      document.getElementById('adminPanel').style.display = 'block';
      loadPosts();
    } else {
      document.getElementById('loginBox').style.display = 'flex';
      document.getElementById('adminPanel').style.display = 'none';
    }
  });

  async function loadPosts() {
    const listEl = document.getElementById('postList');
    listEl.innerHTML = '<p style="color:#64748b;font-size:14px;">লোড হচ্ছে...</p>';
    const q = query(collection(db, 'blogPosts'), orderBy('createdAt', 'desc'));
    const snap = await getDocs(q);
    if (snap.empty) {
      listEl.innerHTML = '<p style="color:#64748b;font-size:14px;">এখনো কোনো পোস্ট নেই।</p>';
      return;
    }
    listEl.innerHTML = '';
    snap.forEach(docSnap => {
      const d = docSnap.data();
      const div = document.createElement('div');
      div.className = 'post-card';
      div.innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;">
          <div style="flex:1;min-width:0;">
            <div style="display:flex;align-items:center;gap-8px;margin-bottom:8px;flex-wrap:wrap;gap:6px;">
              <span class="${d.status === 'published' ? 'status-live' : 'status-draft'}">${d.status === 'published' ? 'Live' : 'Draft'}</span>
              <span class="tag">${d.category || 'General'}</span>
            </div>
            <h3 style="font-weight:700;color:white;font-size:15px;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${d.title}</h3>
            <p style="color:#64748b;font-size:12px;">${d.createdAt?.toDate ? d.createdAt.toDate().toLocaleDateString('bn-BD') : 'এইমাত্র'}</p>
          </div>
          <div style="display:flex;gap:8px;shrink:0;">
            <button onclick="editPost('${docSnap.id}')" style="background:rgba(6,182,212,0.1);border:1px solid rgba(6,182,212,0.2);color:#67e8f9;padding:8px 12px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;white-space:nowrap;">
              <i class="fa-solid fa-pen"></i>
            </button>
            <button onclick="deletePost('${docSnap.id}')" style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:#f87171;padding:8px 12px;border-radius:8px;cursor:pointer;font-size:13px;white-space:nowrap;">
              <i class="fa-solid fa-trash"></i>
            </button>
          </div>
        </div>
      `;
      listEl.appendChild(div);
    });
  }

  window.savePost = async function(status) {
    const title = document.getElementById('postTitle').value.trim();
    const excerpt = document.getElementById('postExcerpt').value.trim();
    const content = quill.root.innerHTML;
    const category = document.getElementById('postCategory').value;
    const cover = document.getElementById('postCover').value.trim();
    const statusEl = document.getElementById('saveStatus');

    if (!title || !excerpt) {
      statusEl.style.display = 'block';
      statusEl.style.color = '#f87171';
      statusEl.textContent = '❌ টাইটেল ও বিবরণ দেওয়া আবশ্যক।';
      return;
    }

    const data = { title, excerpt, content, category, cover, status, updatedAt: serverTimestamp() };

    try {
      if (editingId) {
        await updateDoc(doc(db, 'blogPosts', editingId), data);
        statusEl.textContent = '✅ পোস্ট আপডেট হয়েছে!';
      } else {
        data.createdAt = serverTimestamp();
        await addDoc(collection(db, 'blogPosts'), data);
        statusEl.textContent = status === 'published' ? '✅ পোস্ট Publish হয়েছে!' : '✅ Draft সেভ হয়েছে!';
      }
      statusEl.style.display = 'block';
      statusEl.style.color = '#4ade80';
      resetForm();
      loadPosts();
      setTimeout(() => { statusEl.style.display = 'none'; }, 3000);
    } catch(e) {
      statusEl.style.display = 'block';
      statusEl.style.color = '#f87171';
      statusEl.textContent = '❌ সেভ হয়নি। আবার চেষ্টা করুন।';
    }
  };

  // Store posts data for editing
  window._postsData = {};

  window.editPost = async function(id) {
    const q = query(collection(db, 'blogPosts'), orderBy('createdAt', 'desc'));
    const snap = await getDocs(q);
    snap.forEach(docSnap => {
      if (docSnap.id === id) {
        const d = docSnap.data();
        editingId = id;
        document.getElementById('postTitle').value = d.title || '';
        document.getElementById('postExcerpt').value = d.excerpt || '';
        document.getElementById('postCategory').value = d.category || 'অন্যান্য';
        document.getElementById('postCover').value = d.cover || '';
        quill.root.innerHTML = d.content || '';
        document.getElementById('formTitle').innerHTML = '<i class="fa-solid fa-pen text-cyan-400 mr-2"></i> পোস্ট এডিট করুন';
        document.getElementById('cancelEdit').style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    });
  };

  window.deletePost = async function(id) {
    if (!confirm('এই পোস্টটি মুছে ফেলবেন?')) return;
    await deleteDoc(doc(db, 'blogPosts', id));
    loadPosts();
  };

  window.cancelEdit = function() {
    resetForm();
  };

  function resetForm() {
    editingId = null;
    document.getElementById('postTitle').value = '';
    document.getElementById('postExcerpt').value = '';
    document.getElementById('postCover').value = '';
    quill.setContents([]);
    document.getElementById('formTitle').innerHTML = '<i class="fa-solid fa-pen-to-square text-cyan-400 mr-2"></i> নতুন পোস্ট লিখুন';
    document.getElementById('cancelEdit').style.display = 'none';
  }
</script>
</body>
</html>
